name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build all workspaces
        run: npm run build

      - name: Lint all workspaces
        run: npm run lint

      - name: TypeScript strict check (orchestrator)
        run: npx tsc --noEmit
        working-directory: packages/orchestrator

  test-orchestrator:
    name: Test Orchestrator
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build --workspace=packages/orchestrator

      - name: Run orchestrator tests
        run: npx vitest run
        working-directory: packages/orchestrator

  test-orchestrator-postgres:
    name: Test Orchestrator Postgres
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build --workspace=packages/orchestrator

      - name: Run orchestrator-postgres unit tests
        run: npx vitest run --passWithNoTests
        working-directory: packages/orchestrator-postgres

  test-memory:
    name: Test Memory
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build --workspace=packages/memory

      - name: Run memory tests
        run: npx vitest run
        working-directory: packages/memory

  test-context-engine:
    name: Test Context Engine
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build --workspace=packages/context-engine

      - name: Run context-engine tests
        run: npx vitest run
        working-directory: packages/context-engine

  test-evals:
    name: Test Evals (Deterministic)
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Run evals unit tests
        run: npx vitest run
        working-directory: packages/evals

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev || true
